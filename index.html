<style>
  /* ===== Make this page full-screen and hide theme chrome ===== */
  html, body { height: 100%; }

  /* Minimal Mistakes wrappers */
  .layout--default .initial-content,
  .layout--home .initial-content,
  .layout--single .initial-content {
    padding-top: 0 !important;
  }

  /* Hide top nav/header + footer + any side bits (THIS PAGE ONLY) */
  .masthead,
  .page__footer,
  .skip-links,
  .breadcrumbs,
  .sidebar,
  .toc {
    display: none !important;
  }

  /* Remove default page spacing */
  .page {
    margin: 0 !important;
    padding: 0 !important;
  }
  .page__inner-wrap {
    padding: 0 !important;
    margin: 0 !important;
    max-width: none !important;
  }
  .page__content {
    padding: 0 !important;
    margin: 0 !important;
  }

  /* ===== Full-screen landing ===== */
  .simple-landing {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: clamp(1.5rem, 3vw, 3rem);
    background: #f5f5f5;
  }

  .simple-landing__panel {
    width: min(920px, 100%);
    text-align: center;
    padding: clamp(2.25rem, 4vw, 3.75rem) clamp(1.25rem, 3vw, 2.25rem);
    border-radius: 18px;
    background: linear-gradient(135deg, #2e9cc3 0%, #19b3a8 100%);
    color: #ffffff;
    box-shadow: 0 18px 45px rgba(0,0,0,.18);
  }

  .simple-landing__name {
    font-size: clamp(2.2rem, 4vw, 3.25rem);
    line-height: 1.1;
    margin: 0 0 .75rem 0;
    font-weight: 750;
    letter-spacing: 0.4px;
  }

  .simple-landing__tagline {
    margin: 0 auto 1.5rem auto;
    max-width: 62ch;
    font-size: 1.05rem;
    opacity: .95;
  }

  /* ===== Icons row ===== */
  .simple-landing__icons {
    display: flex;
    justify-content: center;
    gap: .75rem;
    margin: 0 0 1.5rem 0;
    flex-wrap: wrap;
  }

  .simple-landing__icon {
    width: 44px;
    height: 44px;
    display: inline-grid;
    place-items: center;
    border-radius: 999px;
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.22);
    transition: transform .15s ease, background .15s ease;
    text-decoration: none;
  }
  .simple-landing__icon:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,.26);
  }
  .simple-landing__icon svg {
    width: 22px;
    height: 22px;
    fill: #ffffff;
  }

  /* ===== Nav buttons (all white text, no "selected" look) ===== */
  .simple-landing__nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: .75rem;
    margin-top: .25rem;
  }

  .simple-landing__btn,
  .simple-landing__btn:visited,
  .simple-landing__btn:hover,
  .simple-landing__btn:active {
    color: #ffffff !important;      /* Force all button text white */
    text-decoration: none !important;
  }

  .simple-landing__btn {
    display: inline-block;
    padding: .85rem 1.15rem;
    border-radius: 10px;
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.30);
    font-weight: 650;
    letter-spacing: .2px;
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
    backdrop-filter: blur(6px);
  }

  .simple-landing__btn:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,.20);
    border-color: rgba(255,255,255,.42);
  }

  /* Remove any theme "current" styling if it leaks onto these links */
  .simple-landing__btn.is-active,
  .simple-landing__btn[aria-current="page"] {
    background: rgba(255,255,255,.14) !important;
    border-color: rgba(255,255,255,.30) !important;
    box-shadow: none !important;
  }

  .simple-landing__email {
    margin-top: 1rem;
    font-size: .98rem;
    opacity: .95;
  }
  .simple-landing__email a,
  .simple-landing__email a:visited {
    color: #ffffff !important;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
</style>
